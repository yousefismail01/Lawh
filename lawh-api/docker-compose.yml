version: '3.8'

services:
  api:
    build: .
    env_file: .env
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - DEVICE=${DEVICE:-cpu}
    ports:
      - "8000:8000"
    restart: unless-stopped
    # GPU reservation for Phase 2 (uncomment on EC2 g4dn.xlarge):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt certs (created by certbot on EC2):
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: unless-stopped
